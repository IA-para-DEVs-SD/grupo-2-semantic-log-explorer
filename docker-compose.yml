services:
  # ---- Production Profile ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    profiles:
      - prod
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sle-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    profiles:
      - prod
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sle-network

  # ---- Development Profile ----
  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    profiles:
      - dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sle-network

  frontend-dev:
    image: node:18-alpine
    working_dir: /app
    profiles:
      - dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host
    depends_on:
      backend-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sle-network

networks:
  sle-network:
    driver: bridge
